# ──────────────────────────────────────────────────────────────────────────
# TOPIC QUEUE — the control surface for the automated content pipeline.
#
# How it works (see docs/CONTENT-OPS.md for the full runbook):
#   1. Anyone (you, or Claude proposing) adds a topic with status: proposed.
#   2. YOU approve it: change status to `approved`. THIS is your only required job.
#   3. The drafter (scripts/draft-topic.mjs, run locally or by GitHub Action)
#      turns each `approved` topic into a real .mdx draft in your voice and
#      flips it to `drafted`.
#   4. You glance, set a publishDate, change status to `scheduled` in the .mdx.
#      (Or, if you trust the lane, the Action can schedule automatically.)
#   5. publish-due.mjs flips `scheduled` → `published` when the date arrives.
#
# status values: proposed | approved | drafted | published | rejected
# type:          tutorial | blog
# For tutorials, track + level + tier are required.
# ──────────────────────────────────────────────────────────────────────────

