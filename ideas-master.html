<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DVN Ideas Vault</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#C8102E;--charcoal:#1C1C1C;--gray:#6E6E6E;
  --blue-dark:#1e3c72;--blue-mid:#2a5298;
  --bg:#f4f5f7;--surface:#fff;
  --radius:10px;--shadow:0 4px 18px rgba(0,0,0,.10);
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  font-size:14px;background:var(--bg);color:var(--charcoal);line-height:1.5
}
.header{
  background:linear-gradient(135deg,var(--blue-dark),var(--blue-mid));
  color:#fff;padding:32px 24px 24px;text-align:center
}
.header h1{font-size:26px;font-weight:700;letter-spacing:-.5px}
.header .sub{font-size:13px;opacity:.8;margin-top:6px}
.header .accent{color:#f4b8c1}
.controls{
  background:#fff;border-bottom:1px solid #e0e3e8;
  padding:14px 24px;position:sticky;top:0;z-index:10;
  display:flex;flex-wrap:wrap;gap:10px;align-items:center
}
#search{
  flex:1;min-width:180px;max-width:320px;
  padding:8px 14px;border:1.5px solid #d0d3d8;border-radius:6px;
  font-size:14px;outline:none;transition:border-color .2s
}
#search:focus{border-color:var(--blue-mid)}
.sep{width:1px;height:28px;background:#e0e3e8;flex-shrink:0}
.filters{display:flex;flex-wrap:wrap;gap:5px}
.status-filters{display:flex;flex-wrap:wrap;gap:5px}
.fbtn{
  padding:5px 12px;border:1.5px solid #d0d3d8;border-radius:20px;
  background:#fff;cursor:pointer;font-size:12px;font-weight:500;
  color:var(--gray);transition:all .15s;line-height:1.3
}
.fbtn:hover{background:#f0f2f5;border-color:#b0b3b8}
.fbtn.active{background:var(--blue-mid);border-color:var(--blue-mid);color:#fff}
.stats{
  display:flex;gap:20px;padding:10px 24px;background:#f8f9fb;
  border-bottom:1px solid #e8eaee;font-size:12px;color:var(--gray);flex-wrap:wrap
}
.stat-val{font-weight:700;color:var(--charcoal);margin-right:3px}
.grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:16px;padding:20px 24px
}
.card{
  background:var(--surface);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:18px 20px;
  border-top:3px solid var(--blue-mid);
  display:flex;flex-direction:column;gap:10px;
  transition:transform .15s,box-shadow .15s
}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.13)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-id{font-size:11px;font-weight:600;color:var(--gray);letter-spacing:.3px;white-space:nowrap}
.badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.badge{
  font-size:10px;font-weight:700;padding:2px 8px;
  border-radius:20px;white-space:nowrap
}
.card-text{font-size:14px;font-weight:500;color:var(--charcoal);line-height:1.5}
.pdot{
  width:8px;height:8px;border-radius:50%;
  display:inline-block;margin-right:5px;vertical-align:middle
}
.card-meta{
  font-size:11px;color:var(--gray);
  display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:2px
}
.tag{background:#f0f2f5;padding:2px 7px;border-radius:4px;font-size:10px}
.proj{color:var(--blue-mid);font-weight:500}
.src{opacity:.6}
.empty{text-align:center;padding:60px 20px;color:var(--gray)}
.empty h3{font-size:18px;margin-bottom:8px}
@media(max-width:600px){
  .controls{flex-direction:column;align-items:stretch}
  #search{max-width:none}
  .grid{padding:12px;gap:12px}
}
</style>
</head>
<body>

<div class="header">
  <h1>DVN <span class="accent">Ideas Vault</span></h1>
  <div class="sub">Cross-device &middot; Version-controlled &middot; Built 2026-06-27</div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search ideas&hellip;" oninput="render()">
  <div class="sep"></div>
  <div class="filters">
    <button class="fbtn active" data-f="cat" data-v="all" onclick="setFilter(this,'cat')">All</button>
    <button class="fbtn" data-f="cat" data-v="VNRE" onclick="setFilter(this,'cat')">VNRE</button>
    <button class="fbtn" data-f="cat" data-v="Coaching" onclick="setFilter(this,'cat')">Coaching</button>
    <button class="fbtn" data-f="cat" data-v="AI-Tech" onclick="setFilter(this,'cat')">AI / Tech</button>
    <button class="fbtn" data-f="cat" data-v="Marketing" onclick="setFilter(this,'cat')">Marketing</button>
    <button class="fbtn" data-f="cat" data-v="Operations" onclick="setFilter(this,'cat')">Operations</button>
    <button class="fbtn" data-f="cat" data-v="Product" onclick="setFilter(this,'cat')">Product</button>
    <button class="fbtn" data-f="cat" data-v="Other" onclick="setFilter(this,'cat')">Other</button>
  </div>
  <div class="sep"></div>
  <div class="status-filters">
    <button class="fbtn active" data-f="st" data-v="all" onclick="setFilter(this,'st')">All Status</button>
    <button class="fbtn" data-f="st" data-v="New" onclick="setFilter(this,'st')">New</button>
    <button class="fbtn" data-f="st" data-v="In Progress" onclick="setFilter(this,'st')">In Progress</button>
    <button class="fbtn" data-f="st" data-v="Shipped" onclick="setFilter(this,'st')">Shipped</button>
    <button class="fbtn" data-f="st" data-v="Parked" onclick="setFilter(this,'st')">Parked</button>
  </div>
</div>

<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>

<script>
const IDEAS = [{"id": "IDEA-001", "date": "2026-06-27", "text": "Stage 01 Voice overlay — Vapi/Twilio outbound dialing + Upfirst inbound integration with autonomous appointment booking", "category": "VNRE", "priority": "High", "status": "New", "project": "stage01-prospecting", "tags": ["prospecting", "voice-agent", "automation", "upfirst"], "source": "code"}, {"id": "IDEA-002", "date": "2026-06-27", "text": "Full milestone automation for Stage 05 (Operations) — auto-send HOA documents, inspect reports, appraisal coordination, CD delivery", "category": "VNRE", "priority": "Normal", "status": "New", "project": "operations", "tags": ["operations", "workflow-automation", "transactions"], "source": "code"}, {"id": "IDEA-003", "date": "2026-06-27", "text": "Compliance checklist DNC/TCPA/two-party recording consent sign-off for voice overlay", "category": "VNRE", "priority": "High", "status": "New", "project": "stage01-prospecting", "tags": ["compliance", "voice", "legal", "dnc", "tcpa"], "source": "code"}, {"id": "IDEA-004", "date": "2026-06-27", "text": "Lifetime Value custom field setup in Follow Up Boss — FUB field creation via API or admin UI", "category": "VNRE", "priority": "High", "status": "New", "project": "clv-sync-skill", "tags": ["fub", "custom-fields", "clv"], "source": "code"}, {"id": "IDEA-005", "date": "2026-06-27", "text": "Call-coach client/agent modes — expand Stage 09 from self-mode to DVN Coaching product and new-agent ramp scorecard", "category": "Coaching", "priority": "Normal", "status": "In Progress", "project": "call-coach-skill", "tags": ["call-coach", "productization", "coaching-product", "agent-training"], "source": "code"}, {"id": "IDEA-006", "date": "2026-06-27", "text": "Deeper compliance — PDF AcroForm signature-field parsing for auto-verification", "category": "VNRE", "priority": "Low", "status": "New", "project": "compliance-auditor-skill", "tags": ["compliance", "pdf-parsing", "signature-verification"], "source": "code"}, {"id": "IDEA-007", "date": "2026-06-27", "text": "CEO Dashboard roadmap — add GCI/transaction pace row, monthly margin sparkline, cash position from balance sheet", "category": "VNRE", "priority": "Normal", "status": "New", "project": "ceo-dashboard-skill", "tags": ["dashboard", "reporting", "kpis"], "source": "code"}, {"id": "IDEA-008", "date": "2026-06-27", "text": "Database & COI delivery layer — auto-create Gmail drafts + Canva equity one-pagers + log planned touches to FUB", "category": "VNRE", "priority": "Normal", "status": "In Progress", "project": "database-coi-skill", "tags": ["database-coi", "email-automation", "canva", "fub-integration"], "source": "code"}, {"id": "IDEA-009", "date": "2026-06-27", "text": "Database & COI loop-closure — write touch back to FUB + track responses → referral attribution", "category": "VNRE", "priority": "High", "status": "New", "project": "database-coi-skill", "tags": ["database-coi", "loop-closure", "attribution", "50-percent-referral"], "source": "code"}, {"id": "IDEA-010", "date": "2026-06-27", "text": "Do-Not-Contact/Opt-Out hard suppression guard in Database & COI — source from FUB tags", "category": "VNRE", "priority": "High", "status": "New", "project": "database-coi-skill", "tags": ["compliance", "fub-custom-fields", "database-coi"], "source": "code"}, {"id": "IDEA-011", "date": "2026-06-27", "text": "Real AVM (Automated Valuation Model) instead of flat 5% appreciation for equity estimates", "category": "VNRE", "priority": "Normal", "status": "New", "project": "database-coi-skill", "tags": ["equity-estimation", "valuation", "cma"], "source": "code"}, {"id": "IDEA-012", "date": "2026-06-27", "text": "Per-ZIP appreciation table for equity — replace single APPRECIATION_RATE with ZIP lookup from Heartland MLS YoY data", "category": "VNRE", "priority": "Normal", "status": "New", "project": "database-coi-skill", "tags": ["equity", "market-data", "appreciation"], "source": "code"}, {"id": "IDEA-013", "date": "2026-06-27", "text": "Rate-watch automation for refinance MSA income — auto-fire refi list when market 30-yr drops below client's locked rate", "category": "VNRE", "priority": "Normal", "status": "New", "project": "database-coi-skill", "tags": ["refi", "msa-income", "automation"], "source": "code"}, {"id": "IDEA-014", "date": "2026-06-27", "text": "Listing-inventory cross-ref in Database & COI — trigger 'neighbor sold' touch when move-window client's neighborhood gets new comp sale", "category": "VNRE", "priority": "Normal", "status": "New", "project": "database-coi-skill", "tags": ["database-coi", "listing-leads", "comps"], "source": "code"}, {"id": "IDEA-015", "date": "2026-06-27", "text": "Equity-to-listing scoring — combine tenure + equity + property-view into single 'likely to list in 12 mo' score, feed hottest to PLP pipeline", "category": "VNRE", "priority": "Normal", "status": "New", "project": "database-coi-skill", "tags": ["database-coi", "listing-leads", "predictive"], "source": "code"}, {"id": "IDEA-016", "date": "2026-06-27", "text": "QuickBooks → FUB Lifetime Value sync as standalone skill — build CLV engine as separate productizable module", "category": "Product", "priority": "High", "status": "In Progress", "project": "clv-sync-skill", "tags": ["clv", "productization", "fub", "quickbooks"], "source": "code"}, {"id": "IDEA-017", "date": "2026-06-27", "text": "NPS Score + Referrals-Given tracking in FUB — high-leverage adds for gating referral asks to promoters only", "category": "VNRE", "priority": "High", "status": "New", "project": "database-coi-skill", "tags": ["fub-custom-fields", "nps", "referrals"], "source": "code"}, {"id": "IDEA-018", "date": "2026-06-27", "text": "ERS workflow deal-term pull from FUB — pull list price, term dates, seller2 from FUB deals instead of asking DVN", "category": "VNRE", "priority": "Normal", "status": "New", "project": "send-ers-agreement", "tags": ["ers-send", "automation", "fub-integration"], "source": "code"}, {"id": "IDEA-019", "date": "2026-06-27", "text": "ERS Seller2 email handling — co-owner email management when spouse shares an inbox", "category": "VNRE", "priority": "Low", "status": "New", "project": "send-ers-agreement", "tags": ["ers-send", "seller2"], "source": "code"}, {"id": "IDEA-020", "date": "2026-06-27", "text": "EBA (Buyer Agency) variant of ERS skill — build buyer-agency agreement send workflow using DocuSeal template 3751998", "category": "VNRE", "priority": "Low", "status": "New", "project": "send-ers-agreement", "tags": ["buyer-agent", "eba", "workflow"], "source": "code"}, {"id": "IDEA-021", "date": "2026-06-27", "text": "Buyer-agent coverage model — extend VNRE operations to track and manage buyer-side transactions", "category": "VNRE", "priority": "Normal", "status": "New", "project": "", "tags": ["business-model", "buyer-agent", "transactions"], "source": "code"}, {"id": "IDEA-022", "date": "2026-06-27", "text": "AI Coaching product components — custom GPT trained on DVN scripts/voice, objection drills, and 100 Ways to Add 25 Deals IP", "category": "Coaching", "priority": "Normal", "status": "New", "project": "dvn-coaching", "tags": ["productization", "coaching", "ai", "gpt"], "source": "code"}, {"id": "IDEA-023", "date": "2026-06-27", "text": "AI Marketing automation suite — listing descriptions, image enhancement, video tours, Just-Listed/Just-Sold short-form at scale", "category": "AI-Tech", "priority": "Normal", "status": "New", "project": "content-engine-skill", "tags": ["marketing", "ai", "automation", "productization"], "source": "code"}, {"id": "IDEA-024", "date": "2026-06-27", "text": "Buyer-side operations and coach tools — extend aiDrVN 9-stage model to buyer-agent workflows", "category": "Product", "priority": "Normal", "status": "New", "project": "", "tags": ["productization", "buyer-operations", "aiDrVN"], "source": "code"}, {"id": "IDEA-025", "date": "2026-06-27", "text": "FUB custom fields confirmation — segment labels, close-date/price location, sold JSON price/commission structure", "category": "VNRE", "priority": "High", "status": "New", "project": "database-coi-skill", "tags": ["fub", "data-mapping", "integration"], "source": "code"}, {"id": "IDEA-026", "date": "2026-06-27", "text": "Compliance form set confirmation with broker — confirm Stage 01/03/05/06 required documents per Heartland MLS", "category": "VNRE", "priority": "High", "status": "New", "project": "compliance-auditor-skill", "tags": ["compliance", "broker-coordination", "forms"], "source": "code"}, {"id": "IDEA-027", "date": "2026-06-27", "text": "Voice vendor decision — evaluate and choose between Vapi and Twilio for autonomous outbound dialing", "category": "VNRE", "priority": "High", "status": "New", "project": "stage01-prospecting", "tags": ["vendor-selection", "voice-automation", "prospecting"], "source": "code"}, {"id": "IDEA-028", "date": "2026-06-27", "text": "Granola transcripts for call-coach — pull past listing/closing call transcripts for life-event detection and future-touch scheduling", "category": "VNRE", "priority": "Normal", "status": "New", "project": "database-coi-skill", "tags": ["granola", "call-coach", "life-events"], "source": "code"}, {"id": "IDEA-029", "date": "2026-06-27", "text": "Scheduled task cadence setup in Cowork — create all recurring tasks from scheduled-tasks/ folder definitions", "category": "Operations", "priority": "High", "status": "New", "project": "scheduled-tasks", "tags": ["scheduling", "automation", "cowork"], "source": "code"}, {"id": "IDEA-030", "date": "2026-06-27", "text": "FUB segment labels setup — confirm and apply FSBO, Expired, Aged Lead, Geo-farm, COI, Past Client tags for active-hunter targeting", "category": "VNRE", "priority": "High", "status": "New", "project": "active-hunter-skill", "tags": ["fub", "segmentation", "prospecting"], "source": "code"}, {"id": "IDEA-031", "date": "2026-06-27", "text": "Photo selection policy for content-engine — define and document rules for which listing photos to use in social captions", "category": "VNRE", "priority": "Normal", "status": "New", "project": "content-engine-skill", "tags": ["content-engine", "social-media", "branding"], "source": "code"}, {"id": "IDEA-032", "date": "2026-06-27", "text": "aiDrVN productization roadmap — decide packaging, licensing, tier structure for selling coaching tools and VNRE ops modules", "category": "Product", "priority": "Normal", "status": "New", "project": "", "tags": ["productization", "business-model", "aidrVN"], "source": "code"}, {"id": "IDEA-033", "date": "2026-06-27", "text": "Content-engine graphics delivery — integrate with premarket-social-automation/vnre_social_graphic.py or Canva brand template for 1080×1080/1350/1920 renders", "category": "VNRE", "priority": "Normal", "status": "New", "project": "content-engine-skill", "tags": ["content-engine", "graphics", "social"], "source": "code"}, {"id": "IDEA-034", "date": "2026-06-27", "text": "Content-engine FUB blast to Publer scheduling — route email/SMS blast to Publer via Claude-in-Chrome and confirm schedule before send", "category": "VNRE", "priority": "Normal", "status": "New", "project": "content-engine-skill", "tags": ["content-engine", "publer", "email", "scheduling"], "source": "code"}, {"id": "IDEA-035", "date": "2026-06-27", "text": "Call coach rubric sync with active-hunter scripts — keep checkpoints + objection patterns in sync when call scripts change", "category": "VNRE", "priority": "Normal", "status": "New", "project": "call-coach-skill", "tags": ["call-coach", "call-scripts", "maintenance"], "source": "code"}, {"id": "IDEA-036", "date": "2026-06-27", "text": "Ideas vault weekly digest as scheduled task — run every Mon 7:15 AM to surface New/In Progress ideas overdue for review", "category": "Operations", "priority": "Normal", "status": "New", "project": "ideas-vault", "tags": ["ideas-vault", "scheduling", "ops"], "source": "code"}, {"id": "IDEA-037", "date": "2026-06-27", "text": "DVN-Coaching-Framework productization — Build Tier-1/2/3 coaching course tiers with framework + call-coach + AI tools", "category": "Coaching", "priority": "Normal", "status": "New", "project": "dvn-coaching", "tags": ["productization", "coaching", "curriculum"], "source": "code"}, {"id": "IDEA-038", "date": "2026-06-27", "text": "Lead scrubbing automation — auto-clean 'maybe someday' prospects from FUB lead stack weekly to keep list hot and focused", "category": "VNRE", "priority": "Low", "status": "New", "project": "active-hunter-skill", "tags": ["lead-mgmt", "fub", "prospect-hygiene"], "source": "code"}];
const CAT   = {"VNRE": ["#C8102E", "#FFFFFF"], "Coaching": ["#1e3c72", "#FFFFFF"], "AI-Tech": ["#6f42c1", "#FFFFFF"], "Marketing": ["#fd7e14", "#FFFFFF"], "Operations": ["#20c997", "#1C1C1C"], "Product": ["#0dcaf0", "#1C1C1C"], "Other": ["#adb5bd", "#1C1C1C"]};
const PRI   = {"High": "#C8102E", "Normal": "#2a5298", "Low": "#adb5bd"};
const STA   = {"New": "#2a5298", "In Progress": "#e07b00", "Shipped": "#198754", "Parked": "#6E6E6E"};

let filters = { cat: 'all', st: 'all' };

function setFilter(btn, dim) {
  document.querySelectorAll(`.fbtn[data-f="${dim}"]`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filters[dim] = btn.dataset.v;
  render();
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function badge(text, bg, color) {
  return `<span class="badge" style="background:${bg};color:${color}">${esc(text)}</span>`;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = IDEAS.filter(i => {
    if (filters.cat !== 'all' && i.category !== filters.cat) return false;
    if (filters.st  !== 'all' && i.status   !== filters.st)  return false;
    if (!q) return true;
    return (
      i.text.toLowerCase().includes(q) ||
      i.id.toLowerCase().includes(q) ||
      (i.project||'').toLowerCase().includes(q) ||
      (i.tags||[]).some(t => t.toLowerCase().includes(q))
    );
  });

  // stats
  const counts = {};
  filtered.forEach(i => counts[i.status] = (counts[i.status]||0) + 1);
  document.getElementById('stats').innerHTML =
    `<span><span class="stat-val">${filtered.length}</span>ideas</span>` +
    Object.entries(counts).map(([s,c]) =>
      `<span><span class="stat-val" style="color:${STA[s]||'#333'}">${c}</span>${s}</span>`
    ).join('');

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty"><h3>No ideas match</h3><p>Try a different search or filter.</p></div>';
    return;
  }
  const sorted = [...filtered].sort((a,b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
  grid.innerHTML = sorted.map(idea => {
    const [catBg, catFg] = CAT[idea.category] || ['#adb5bd','#1C1C1C'];
    const priColor  = PRI[idea.priority] || '#adb5bd';
    const staBg     = STA[idea.status]  || '#adb5bd';
    const tags = (idea.tags||[]).map(t => `<span class="tag">${esc(t)}</span>`).join('');
    const proj = idea.project ? `<span class="proj">${esc(idea.project)}</span>` : '';
    const src  = `<span class="src">${idea.source === 'cowork' ? 'Cowork' : 'Code'}</span>`;
    return `
<div class="card" style="border-top-color:${catBg}">
  <div class="card-top">
    <div class="card-id">${esc(idea.id)} &middot; ${esc(idea.date)}</div>
    <div class="badges">
      ${badge(idea.category, catBg, catFg)}
      ${badge(idea.status, staBg, '#fff')}
    </div>
  </div>
  <div class="card-text">
    <span class="pdot" style="background:${priColor}" title="Priority: ${esc(idea.priority)}"></span>${esc(idea.text)}
  </div>
  <div class="card-meta">${tags}${proj}${src}</div>
</div>`;
  }).join('');
}
render();
</script>
</body>
</html>
