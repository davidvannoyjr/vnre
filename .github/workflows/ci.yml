name: CI

on:
  workflow_dispatch: {}
  push:
    paths: ["platform/**", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["platform/**", ".github/workflows/ci.yml"]

defaults:
  run:
    working-directory: platform

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci || npm install
      - run: npm run content:check
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
        env:
          # Build must succeed without secrets; auth/billing are lazy at runtime.
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
